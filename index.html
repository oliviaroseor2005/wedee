<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamHub — Watch, Discover, Enjoy</title>
<meta name="description" content="StreamHub is a fast, modern video streaming platform. Browse trending, recent, and popular videos across every category.">
<link rel="canonical" href="https://example.com/index.html" id="canonicalLink">

<meta property="og:type" content="website">
<meta property="og:title" content="StreamHub — Watch, Discover, Enjoy">
<meta property="og:description" content="A fast, modern video streaming platform.">
<meta property="og:image" content="assets/logo.png">
<meta property="og:url" content="https://example.com/index.html">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="StreamHub — Watch, Discover, Enjoy">
<meta name="twitter:description" content="A fast, modern video streaming platform.">
<meta name="twitter:image" content="assets/logo.png">

<link rel="icon" href="assets/logo.png">

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="preconnect" href="https://reactahead.com">
<link rel="dns-prefetch" href="https://video-api.olivia-rose-or2005.workers.dev">
<link rel="dns-prefetch" href="https://data.bots62340.workers.dev">
<link rel="preload" href="style.css" as="style">
<link rel="preload" href="config.js" as="script">

<script>
(function () {
  try {
    if (localStorage.getItem("streamhub_theme") === "light") {
      document.documentElement.setAttribute("data-theme", "light");
    }
  } catch (e) { /* ignore */ }
})();
</script>

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===================== HEADER ===================== -->
<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="brand">
      <div class="brand-logo">S</div>
      <span class="brand-name">Stream<span>Hub</span></span>
    </a>

    <nav class="main-nav" aria-label="Primary">
      <a href="index.html" class="active">Videos</a>
      <a href="#">Category</a>
      <a href="#">Live</a>
      <a href="#">Community</a>
      <a href="#">Upload</a>
      <a href="#">About</a>
    </nav>

    <div class="search-box">
      <input type="search" id="searchInput" placeholder="Search videos, tags, creators…" aria-label="Search videos">
      <span class="icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </span>
    </div>

    <div class="auth-area" id="authWidget">
      <button class="auth-signin-btn" id="fallbackSignInBtn">Sign In</button>
    </div>

    <button class="hamburger" id="hamburgerBtn" aria-label="Open filters menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
</header>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ===================== LAYOUT ===================== -->
<div class="layout container">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <button class="sidebar-close" id="sidebarClose" aria-label="Close filters">✕</button>

    <div class="sidebar-section">
      <h3 class="sidebar-title">Browse</h3>
      <button class="filter-btn" data-quick="recent">Recently Added</button>
      <button class="filter-btn" data-quick="popular">Most Viewed</button>
      <button class="filter-btn" data-quick="trending">Trending</button>
      <button class="filter-btn" data-quick="random">Random</button>
    </div>

    <div class="sidebar-section">
      <h3 class="sidebar-title">Categories</h3>
      <div id="categoryFilters"></div>
    </div>

    <div class="sidebar-section">
      <h3 class="sidebar-title">Duration</h3>
      <button class="filter-btn" data-length="short">Short Videos (&lt;20m)</button>
      <button class="filter-btn" data-length="long">Long Videos (20m+)</button>
    </div>

    <div class="sidebar-section">
      <h3 class="sidebar-title">Sort / Upload Date</h3>
      <select class="select-field" id="sortSelect" aria-label="Sort videos">
        <option value="random">Random</option>
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="views">Most Viewed</option>
        <option value="alpha">Alphabetical</option>
      </select>
    </div>

    <div class="sidebar-section">
      <h3 class="sidebar-title">Tags</h3>
      <div class="tag-cloud" id="tagCloud"></div>
    </div>
  </aside>

  <!-- VIDEO GRID -->
  <main class="content-col">
    <div class="toolbar">
      <h1 id="gridTitle">All Videos</h1>
      <span class="result-count" id="resultCount">Loading…</span>
    </div>

    <div class="video-grid" id="videoGrid"></div>

    <div class="loader-wrap" id="loaderWrap">
      <span class="spinner"></span> Loading more videos…
    </div>

    <div id="scrollSentinel" style="height:1px;"></div>

    <!-- Shown only while a search is active (script.js toggles this).
         Videos related to the query by author/tag, or random videos
         if nothing at all is related — so search never dead-ends. -->
    <div class="more-videos-section" id="moreVideosSection" style="display:none;">
      <h2 class="related-heading">More Videos</h2>
      <div class="video-grid" id="moreVideosGrid"></div>
    </div>
  </main>

  <!-- RIGHT AD COLUMN — 2 stacked 160px-wide units, kept narrow so it
       doesn't compete with the content column for space. -->
  <aside class="ad-column" id="adColumn">
    <div class="ad-unit"><div class="ad-label">Advertisement</div><div class="ad-slot" id="adSlot1">Advertisement</div></div>
    <div class="ad-unit"><div class="ad-label">Advertisement</div><div class="ad-slot" id="adSlot3">Advertisement</div></div>
  </aside>

</div>

<!-- ===================== FOOTER ===================== -->
<footer class="site-footer">
  <p>&copy; 2026 StreamHub. All rights reserved. &middot; <a href="#">Terms</a> &middot; <a href="#">Privacy</a> &middot; <a href="#">Contact</a></p>
</footer>

<!-- 1. config.js — defines AD_CODES, fillAdSlot(), VIDEO_FOLDER, etc. -->
<script src="config.js"></script>

<!-- 1b. countries.js — country list + dial codes, used by the sign-up
        modal's Country field (auth.js). -->
<script src="countries.js"></script>

<!-- 2. Fill the 2 ad slots after config.js, deferred to idle time so ad
        iframes never compete with the video grid for bandwidth/CPU on
        the critical rendering path (ads are below-the-fold/side content,
        not part of LCP). Falls back to setTimeout on browsers without
        requestIdleCallback (Safari). -->
<script>
(function () {
  var runWhenIdle = window.requestIdleCallback || function (cb) { setTimeout(cb, 1); };
  runWhenIdle(function () {
  var slots = [
    ["adSlot1", "banner160x300"],
    ["adSlot3", "banner160x600"]
  ];
  slots.forEach(function (pair) {
    var id = pair[0], key = pair[1];
    var el = document.getElementById(id);
    if (!el) return;
    if (typeof fillAdSlot !== "function") {
      el.textContent = "Error: config.js not loaded (fillAdSlot missing)";
      el.style.color = "#ff6b6b";
      console.error("[ads] fillAdSlot is not defined — check config.js is returning 200, not 404, in DevTools > Network.");
      return;
    }
    if (typeof AD_CODES === "undefined" || !AD_CODES[key] || !AD_CODES[key].trim()) {
      el.textContent = 'Error: no AD_CODES entry for "' + key + '"';
      el.style.color = "#ff6b6b";
      console.error('[ads] AD_CODES["' + key + '"] is empty in config.js.');
      return;
    }
    var ok = fillAdSlot(el, key);
    if (!ok) {
      el.textContent = 'Error: fillAdSlot() failed for "' + key + '"';
      el.style.color = "#ff6b6b";
    }
  });
  if (typeof injectPageLevelAds === "function") injectPageLevelAds();
  // Sticky bottom ad bar for phones/tablets — the right-hand ad column
  // is hidden below 840px width, so without this, mobile visitors (most
  // of a video site's traffic) would see no ads at all. See
  // renderMobileAdBar() in config.js.
  if (typeof renderMobileAdBar === "function") renderMobileAdBar();
  });
})();
</script>

<!-- 3. Home page grid/search/filter logic. -->
<script src="script.js"></script>

<!-- 4/5. Firebase + auth. type="module" scripts are deferred by the
         browser and always run after the document has finished
         parsing (so #authWidget above already exists), in this order. -->
<script type="module" src="firebase-config.js"></script>
<script type="module" src="auth.js"></script>

<!-- 6. Wires the static fallback Sign In button. auth.js replaces this
        whole button (and this listener with it) the moment Firebase
        resolves the auth state — this is only what's clicked in the
        brief window before that, or if auth.js failed entirely. -->
<script>
(function () {
  var btn = document.getElementById("fallbackSignInBtn");
  if (!btn) return;
  btn.addEventListener("click", function () {
    if (window.StreamHubAuth && typeof window.StreamHubAuth.openModal === "function") {
      window.StreamHubAuth.openModal("signin");
    } else {
      alert("Sign-in isn't ready yet. Open DevTools (F12) > Console for the error — likely a 404 or blocked request for firebase-config.js or auth.js.");
      console.error("[auth] window.StreamHubAuth is not available — firebase-config.js/auth.js did not finish loading.");
    }
  });
})();
</script>

<!-- PERFORMANCE: register the service worker only after the page has
     fully loaded (window 'load'), so SW install/activation never
     competes with this page's own critical rendering work. -->
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("sw.js").catch(function (err) {
      console.warn("[sw] registration failed (site still works without it):", err);
    });
  });
}
</script>
</body>
</html>
